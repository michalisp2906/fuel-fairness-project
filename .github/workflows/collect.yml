name: Collect fuel snapshots

on:
  schedule:
    - cron: "0 6,12,18 * * *"   # 06:00, 12:00, 18:00 UTC every day
  workflow_dispatch:            # also lets you run it by hand from the Actions tab

permissions:
  contents: write               # required so the job can push the data back

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests
      - name: Check secret lengths (temporary)
        run: |
          echo "id length: ${#FUEL_FINDER_CLIENT_ID}"
          echo "secret length: ${#FUEL_FINDER_CLIENT_SECRET}"
        env:
          FUEL_FINDER_CLIENT_ID: ${{ secrets.FUEL_FINDER_CLIENT_ID }}
          FUEL_FINDER_CLIENT_SECRET: ${{ secrets.FUEL_FINDER_CLIENT_SECRET }}
      - name: Pull snapshot
        env:
          FUEL_FINDER_CLIENT_ID: ${{ secrets.FUEL_FINDER_CLIENT_ID }}
          FUEL_FINDER_CLIENT_SECRET: ${{ secrets.FUEL_FINDER_CLIENT_SECRET }}
        run: python fuel_snapshot.py
      - name: Commit new snapshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No new data to commit"
          else
            git commit -m "Fuel snapshot $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            git push
          fi